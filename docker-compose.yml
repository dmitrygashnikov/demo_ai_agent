services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tutor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutor_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tutor}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tutor} -d ${POSTGRES_DB:-tutor}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  code-executor:
    image: demo_ai_agent-code-executor:latest
    build:
      context: ./code-executor
    ports:
      - "9000:9000"
    environment:
      EXECUTION_TIMEOUT_SECONDS: ${EXECUTION_TIMEOUT_SECONDS:-10}
      EXECUTION_MEMORY_MB: ${EXECUTION_MEMORY_MB:-256}
    # No outbound network for the sandbox itself once started would be ideal;
    # the service is isolated and only reachable on the internal compose network.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:9000/health'); "]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Langfuse self-hosted (LLM/agent observability & tracing).
  # Uses its OWN dedicated Postgres (langfuse-db) — NOT the application postgres.
  # Tracing is OPTIONAL: the backend never depends_on Langfuse and degrades
  # gracefully when it is unavailable or no keys are configured.
  # ---------------------------------------------------------------------------
  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${LANGFUSE_DB_USER:-langfuse}
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse_pass}
      POSTGRES_DB: ${LANGFUSE_DB_NAME:-langfuse}
    volumes:
      - langfusedbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LANGFUSE_DB_USER:-langfuse} -d ${LANGFUSE_DB_NAME:-langfuse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_DB_USER:-langfuse}:${LANGFUSE_DB_PASSWORD:-langfuse_pass}@langfuse-db:5432/${LANGFUSE_DB_NAME:-langfuse}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-nextauth-secret}
      SALT: ${LANGFUSE_SALT:-changeme-salt}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      # Auto-provision an organisation, project, default admin user and API keys
      # on first boot so the admin can log in AND tracing works out-of-the-box
      # (the same keys are passed to the backend below). Override any of these
      # via .env. The admin login defaults to admin@example.com / qwerty123456.
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-tutor-org}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-tutor-project}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-tutor-public-key}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-tutor-secret-key}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@example.com}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-qwerty123456}
    healthcheck:
      # Langfuse binds to the container's external interface (not loopback), so
      # the healthcheck targets the container's own IP via $(hostname -i).
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i):3000/api/public/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  backend:
    image: demo_ai_agent-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      QDRANT_HOST: qdrant
      REDIS_HOST: redis
      CODE_EXECUTOR_URL: http://code-executor:9000
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      # Application JWT auth + default application user (separate from Langfuse).
      # Defaults make the stack work out-of-the-box; override in .env.
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me-in-production}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      APP_DEFAULT_USER_EMAIL: ${APP_DEFAULT_USER_EMAIL:-admin@example.com}
      APP_DEFAULT_USER_PASSWORD: ${APP_DEFAULT_USER_PASSWORD:-qwerty123456}
      APP_DEFAULT_USER_NAME: ${APP_DEFAULT_USER_NAME:-admin}
      APP_DEFAULT_USER_LANGUAGE: ${APP_DEFAULT_USER_LANGUAGE:-python}
      # Use the SAME keys the Langfuse project was provisioned with above, so
      # graph tracing into the admin project is enabled out-of-the-box. These
      # override any empty values coming from .env.
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-tutor-public-key}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-tutor-secret-key}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      code-executor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    # Pre-built tag is reused if present (see README "Frontend build & DNS").
    # The build sandbox on some networks cannot resolve registry.npmjs.org;
    # build this image with a DNS-enabled buildx builder, e.g.:
    #   docker buildx create --name dnsbuilder --driver docker-container --config buildkitd.toml
    #   docker buildx --builder dnsbuilder build --load -t demo_ai_agent-frontend:latest ./frontend
    image: demo_ai_agent-frontend:latest
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  qdrantdata:
  langfusedbdata:
